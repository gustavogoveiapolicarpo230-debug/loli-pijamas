<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loli Pijamas</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💤 Loli Pijamas</h1>
    <p>Pijamas confortáveis e lindos 💕</p>
</header>

<section>
    <h2>Nossos Produtos</h2>

    <div class="produto">
        <img src="1777033680350.jpg" width="200">
        <h3>Pijama Americano</h3>
        <p>Super confortável e lindo 💕</p>
        <p><strong>R$ 79,90</strong></p>

        <label>
            <input type="checkbox" id="presente1">
            🎁 É para presente
        </label>

        <br>

        <button onclick="adicionarCarrinhoComPresente('Pijama Americano', 79.90, 'presente1')">
            Adicionar ao carrinho
        </button>
    </div>

    <div class="produto">
        <img src="1777033680344.jpg" width="200">
        <h3>Pijama Blogueirinha</h3>
        <p>Delicado e lindo</p>
        <p><strong>R$ 39,90</strong></p>

        <label>
            <input type="checkbox" id="presente2">
            🎁 É para presente
        </label>

        <br>

        <button onclick="adicionarCarrinhoComPresente('Pijama Blogueirinha', 39.90, 'presente2')">
            Adicionar ao carrinho
        </button>
    </div>
</section>

<section class="pagamento">
    <h2>💳 Formas de Pagamento</h2>

    <div class="opcoes-pagamento">
        <label class="pag-item">
            <input type="radio" name="pagamento" value="Pix">
            💸 Pix
        </label>

        <label class="pag-item">
            <input type="radio" name="pagamento" value="Dinheiro">
            💵 Dinheiro
        </label>

        <label class="pag-item">
            <input type="radio" name="pagamento" value="Cartão de crédito">
            💳 Crédito
        </label>

        <label class="pag-item">
            <input type="radio" name="pagamento" value="Cartão de débito">
            💳 Débito
        </label>
    </div>
</section>

<section class="entrega">
    <h2>🚚 Entrega ou Retirada</h2>

    <div class="opcoes-entrega">
        <label class="entrega-item">
            <input type="radio" name="tipoEntrega" value="Retirada" onclick="mostrarEndereco(false)">
            🏪 Retirada
        </label>

        <label class="entrega-item">
            <input type="radio" name="tipoEntrega" value="Entrega" onclick="mostrarEndereco(true)">
            🚚 Entrega
        </label>
    </div>

    <div id="campo-endereco" style="display: none;">
        <input type="text" id="endereco" placeholder="Digite seu endereço completo">
    </div>
</section>

<section class="carrinho">
    <h2>🛒 Meu Carrinho</h2>

    <ul id="lista-carrinho"></ul>

    <p><strong>Total: R$ <span id="total">0.00</span></strong></p>

    <button onclick="finalizarCompra()">Finalizar no WhatsApp</button>
</section>

<a href="https://wa.me/5587991292282?text=Olá!%20Quero%20mais%20informações%20sobre%20os%20pijamas%20💤" 
   class="whatsapp-fixo" 
   target="_blank">
   💬
</a>

<script src="script.js"></script>

</body>
</html>
